[board]
name   = "Teensy 4.0 (IMXRT1062)"
chip   = "MIMXRT1062DVJ6A"
target = "thumbv7em-none-eabihf"

# Teensy 4.0 is normally flashed via HalfKay bootloader (teensy_loader_cli).
# SWD debug is available via pads on the underside of the board.
# probe-rs supports MIMXRT1062 if you have an external debug probe wired up.

[probe]
protocol = "swd"
speed    = 4000          # kHz — via soldered SWD pads only

[flash]
restore_unwritten = false
halt_afterwards   = false

[rtt]
enabled  = true
channels = [{ up = 0, name = "Terminal" }]

[new_project]
runner = "teensy_loader_cli --mcu=TEENSY40 -w -v"

dependencies = '''
cortex-m    = { version = "0.7.7", features = ["inline-asm"] }
cortex-m-rt = "0.7.5"
panic-halt  = "1.0"
rtt-target  = "0.6"
teensy4-bsp = { version = "0.5", features = ["rt"] }
'''

files = """
rustdyno.toml
src/main.rs
.cargo/config.toml
"""

replace = """
rustdyno.toml
.cargo/config.toml
"""
