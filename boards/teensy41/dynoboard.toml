[board]
name   = "Teensy 4.1 (IMXRT1062)"
chip   = "MIMXRT1062DVJ6A"
target = "thumbv7em-none-eabihf"

# Teensy 4.1 uses the same IMXRT1062 as the 4.0 but adds more pins,
# 8MB external flash, Ethernet, and optional PSRAM.
# Flashed via HalfKay bootloader (teensy_loader_cli).
# SWD debug available via pads on the underside of the board.

[probe]
protocol = "swd"
speed    = 4000          # kHz — via soldered SWD pads only

[flash]
restore_unwritten = false
halt_afterwards   = false

[rtt]
enabled  = true
channels = [{ up = 0, name = "Terminal" }]

[new_project]
runner = "teensy_loader_cli --mcu=TEENSY41 -w -v"

dependencies = '''
cortex-m    = { version = "0.7.7", features = ["inline-asm"] }
cortex-m-rt = "0.7.5"
panic-halt  = "1.0"
rtt-target  = "0.6"
teensy4-bsp = { version = "0.5", features = ["rt", "teensy41"] }
'''

files = """
rustdyno.toml
src/main.rs
.cargo/config.toml
"""

replace = """
rustdyno.toml
.cargo/config.toml
"""
